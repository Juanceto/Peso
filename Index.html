<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Test antigordad</title>
<style>
  :root { --bg:#0f172a; --card:#111827; --text:#e5e7eb; --accent:#ef4444; }
  html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,"Helvetica Neue",Arial,sans-serif}
  .wrap{max-width:560px;margin:10vh auto;padding:24px;background:linear-gradient(180deg,#0b1225,#0a0f1e);border:1px solid #1f2937;border-radius:18px;box-shadow:0 10px 40px rgba(0,0,0,.35)}
  h1{margin:0 0 12px 0;font-size:clamp(22px,3.5vw,30px)}
  p{margin-top:0;opacity:.85}
  .row{display:flex;gap:10px;margin-top:16px}
  input[type="number"]{flex:1;padding:12px 14px;border-radius:12px;border:1px solid #334155;background:#0b1220;color:var(--text);font-size:16px}
  button{padding:12px 16px;border:0;border-radius:12px;background:var(--accent);color:white;font-weight:600;cursor:pointer}
  button:disabled{opacity:.6;cursor:not-allowed}

  .overlay{position:fixed;inset:0;display:none;place-items:center;background:rgba(0,0,0,.8);backdrop-filter:blur(2px);z-index:9999}
  .overlay.show{display:grid;animation:fadeIn .4s ease}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .card{background:#0b1220;border:1px solid #334155;border-radius:18px;padding:22px;max-width:520px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,.5)}
  .card h2{margin:6px 0 10px 0;color:#fff}
  .card p{margin:0 0 14px 0}
  .imgWrap{display:grid;place-items:center;margin:10px 0 16px 0}
  .spin{width:160px;height:160px;object-fit:contain;animation:spin 6s linear infinite}
  @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  .actions{display:flex;justify-content:center;gap:10px}
  .ghost{background:transparent;border:1px solid #475569;color:#e5e7eb}

  .glitchBg::before{
    content:"";position:fixed;inset:0;pointer-events:none;
    background:repeating-linear-gradient(0deg,rgba(255,255,255,.03) 0 2px,transparent 2px 4px);
    animation:scan 2.2s linear infinite;
  }
  @keyframes scan{from{transform:translateY(-10%)}to{transform:translateY(10%)}}
</style>
</head>
<body>
  <div class="wrap">
    <h1>testeo antigordas</h1>
    <p>Ingresa tu peso en <strong>kg</strong> y presiona “Comprobar”.</p>
    <div class="row">
      <input id="peso" type="number" min="0" step="0.1" placeholder="Ej: 72.5" />
      <button id="btn">Comprobar</button>
    </div>
    <p id="msg" style="margin-top:12px;min-height:20px;"></p>
  </div>

  <!-- AUDIO -->
  <audio id="audioAlerta" src="gelda.mp3"></audio>

  <!-- Overlay -->
  <div id="overlay" class="overlay">
    <div class="card">
      <div class="imgWrap">
        <img src="antigordas.jpg" alt="Advertencia" class="spin" />
      </div>
      <h2>Alerta do gordão</h2>
      <p>aflojale a los sorrentinos.<br/>
         ALERTA GORDA ALERTA GORDA ALERTA GORDA!.</p>
      <div class="actions">
        <button class="ghost" id="cerrar">Cerrar</button>
      </div>
    </div>
  </div>

<script>
  const peso = document.getElementById('peso');
  const btn = document.getElementById('btn');
  const msg = document.getElementById('msg');
  const overlay = document.getElementById('overlay');
  const cerrar = document.getElementById('cerrar');
  const audio = document.getElementById('audioAlerta');

  btn.addEventListener('click', () => {
    const v = parseFloat(peso.value);
    if (Number.isNaN(v)) {
      msg.textContent = 'Ingresa un número válido.';
      return;
    }
    if (v > 90) {
      msg.textContent = '';
      document.body.classList.add('glitchBg');
      overlay.classList.add('show');

      // 🔊 reproducir audio
      audio.currentTime = 0; // reinicia si ya estaba sonando
      audio.play();

    } else {
      msg.textContent='perfecto.';
    }
  });

  cerrar.addEventListener('click', () => {
    overlay.classList.remove('show');
    document.body.classList.remove('glitchBg');

    // detener audio al cerrar
    audio.pause();
    audio.currentTime = 0;
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && overlay.classList.contains('show')) {
      cerrar.click();
    }
  });
</script>
</body>
</html>
